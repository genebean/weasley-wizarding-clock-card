name: CI

on:
  pull_request:

jobs:
  pre-commit:
    name: pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install npm dependencies
        run: nix develop --command npm ci
      - uses: pre-commit/action@v3.0.1

  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: Install npm dependencies
        run: nix develop --command npm ci
      - name: Type check
        run: nix develop --command npm run typecheck

  nix-build:
    name: nix build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - uses: DeterminateSystems/flake-checker-action@v12
        with:
          # Fail the PR if nixpkgs is more than 30 days stale.
          # The update-flake-lock workflow keeps it fresh on a weekly cadence.
          fail-mode: true
      - name: Ensure npmDepsHash is not the placeholder value
        run: |
          if grep -qF 'sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' flake.nix; then
            echo "::error file=flake.nix::npmDepsHash is still the placeholder. Run 'nix build', copy the 'got:' hash into flake.nix, and commit."
            exit 1
          fi
      - name: nix build
        run: nix build

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Audit for critical vulnerabilities
        run: npm audit --audit-level=critical

  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5.0.0

  # hacs/action validates hacs.json and confirms the card JS file is present.
  # Note: hassfest (home-assistant/actions) validates Python integrations
  # (custom_components) and is not applicable to Lovelace cards.
  hacs-validate:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hacs/action@main
        with:
          category: plugin
